site:
  name: Groove Caviar
  site: 'https://www.groovecaviar.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: 'Groove Caviar — DJ & événementiel haut de gamme à Biarritz'
    template: '%s — Groove Caviar'
  description: "Agence de DJ et d'événementiel haut de gamme basée à Biarritz. Mariages premium, internationaux et soirées d'exception au Pays Basque, dans les Landes et à l'international."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Groove Caviar
    images:
      - url: '~/assets/images/og-groove-caviar.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@groovecaviar'
    site: '@groovecaviar'
    cardType: summary_large_image

i18n:
  language: fr
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6

    post:
      isEnabled: false
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: false
      pathname: 'journal'
      robots:
        index: true

    category:
      isEnabled: false
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: false
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: false
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: 'G-JNP77GV0GC' # configuré mais DORMANT tant que hasExternalScripts=false (RGPD)

ui:
  theme: 'light:only'
