<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groove Caviar | Expériences Sonores d'Exception</title>
    
    <link rel="icon" type="image/webp" href="assets/favicon.webp">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@700&family=Inter:wght=400;700&family=Rock+Salt&display=swap');

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #E5E5E5; 
        }

        .brand-font {
            font-family: 'Josefin Sans', sans-serif;
            font-weight: 700;
            color: #AF9453; /* Ta couleur or #AF9453 */
            letter-spacing: -0.05em; 
        }

        .baseline-cursive {
            font-family: 'Rock Salt', cursive;
            color: #AF9453;
            font-size: 0.75rem; /* Légèrement réduit pour l'harmonie sur mobile */
            line-height: 1.6;
            margin-top: 1rem;
            padding: 0 10px;
        }

        .lux-button { 
            transition: all 0.3s ease; 
            border: 1px solid #AF9453; 
        }
        .lux-button:hover { 
            background-color: #AF9453; 
            color: black; 
        }

        .quote-button {
            background-color: #AF9453;
            color: black;
            font-weight: 700;
        }
        .quote-button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="text-center mb-10 w-full max-w-sm">
        <img src="assets/logo-circulaire.webp" alt="Groove Caviar" class="w-28 mx-auto mb-6">
        
        <h1 class="text-3xl brand-font">GROOVE CAVIAR</h1>
        
        <p class="baseline-cursive">Animation, DJ & musique de qualité pour des événements sans fausse note !</p>
    </div>

    <div class="w-full max-w-sm space-y-4">
        <a href="/mariages" class="block w-full py-4 text-center lux-button text-sm uppercase tracking-wider">Mariages d'Exception</a>
        <a href="/entreprises" class="block w-full py-4 text-center lux-button text-sm uppercase tracking-wider">Événements Corporate</a>
        <a href="/mixes" class="block w-full py-4 text-center lux-button text-sm uppercase tracking-wider">Écouter nos Mixes</a>
        <a href="/contact" class="block w-full py-4 text-center quote-button text-sm uppercase tracking-wider">Demander un Devis</a>
    </div>

</body>
</html>
